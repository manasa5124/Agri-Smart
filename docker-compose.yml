version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agri-smart-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE}
      - WEATHER_API_BASE_URL=${WEATHER_API_BASE_URL}
      - ML_SERVICE_URL=${ML_SERVICE_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - agri-smart-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agri-smart-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - agri-smart-network

networks:
  agri-smart-network:
    driver: bridge
